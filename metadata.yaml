name: web_search_auto
author: bentianjia-0721
display_name: Web Search Auto - 自动网络搜索
desc: >-
  自动网络搜索插件，默认爬 www.bing.com（零部署），
  类似 Claude Code 的 WebSearch 工具。也可切换 DuckDuckGo/SearXNG。
  LLM 自主决定何时使用搜索结果，无需命令前缀。
  v2.1.0: 优化搜索触发机制，增强 LLM 优先使用搜索结果。
version: 2.1.0
repo: https://github.com/bentianjia-0721/astrbot_plugin_web_search_auto
support_platforms:
  - aiocqhttp
  - telegram
  - wechat
astrbot_version: ">=4.16,<5"
